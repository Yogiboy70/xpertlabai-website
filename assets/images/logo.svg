<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 40" fill="none">
  <!-- Circled-X mark (the brand icon — the X in Xpert) -->
  <circle cx="18" cy="20" r="14" stroke="#C9A96E" stroke-width="1.8" fill="none"/>
  <line x1="11" y1="13" x2="25" y2="27" stroke="#C9A96E" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="25" y1="13" x2="11" y2="27" stroke="#C9A96E" stroke-width="2.2" stroke-linecap="round"/>
  <!-- PERT (bold gold) -->
  <text x="40" y="22" font-family="'Georgia', 'Times New Roman', serif" font-size="15" font-weight="700" fill="#C9A96E" letter-spacing="2">PERT</text>
  <!-- LAB (light gold) -->
  <text x="99" y="22" font-family="'Georgia', 'Times New Roman', serif" font-size="15" font-weight="400" fill="#E0C896" letter-spacing="2">LAB</text>
  <!-- AI (bold gold) -->
  <text x="139" y="22" font-family="'Georgia', 'Times New Roman', serif" font-size="15" font-weight="700" fill="#C9A96E" letter-spacing="2">AI</text>
  <!-- thin rule beneath wordmark -->
  <line x1="40" y1="27" x2="162" y2="27" stroke="#C9A96E" stroke-width="0.6" opacity="0.5"/>
  <!-- tagline -->
  <text x="40" y="35" font-family="'Arial', 'Helvetica', sans-serif" font-size="6.5" font-weight="400" fill="#C9A96E" letter-spacing="1.8" opacity="0.75">DOMAIN · INTELLIGENCE · INDIA</text>
</svg>
